name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install project
        run: uv sync --all-extras
      - name: Ruff Check
        run: uv run ruff check src/ tests/
      - name: Ruff Format
        run: uv run ruff format --check src/ tests/
      - name: Pytest
        run: uv run pytest tests/ -m 'not slow' -x --tb=short
