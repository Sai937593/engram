<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Engram UI" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/ui.css') }}">
</head>
<body data-version="{{ snapshot_version }}">
  <aside class="shell-sidebar">
    <div class="brand">
      <div class="brand-mark">E</div>
      <div>
        <div class="brand-title">Engram</div>
        <div class="brand-subtitle">{{ project.name }}</div>
      </div>
    </div>
    <nav class="nav">
      <a class="{{ 'active' if active == 'dashboard' else '' }}" href="/">Dashboard</a>
      <a class="{{ 'active' if active == 'tasks' else '' }}" href="/tasks">Tasks</a>
      <a class="{{ 'active' if active == 'memories' else '' }}" href="/memories">Memories</a>
      <a class="{{ 'active' if active == 'sessions' else '' }}" href="/sessions">Sessions</a>
      <a class="{{ 'active' if active == 'audit' else '' }}" href="/audit">Audit</a>
    </nav>
    <div class="sync-panel">
      <span class="sync-dot" id="sync-dot"></span>
      <span>Synced <strong id="last-synced">{{ last_synced }}</strong></span>
    </div>
  </aside>
  <main class="shell-main">
    {% block content %}{% endblock %}
  </main>
  <script>
    window.ENGRAM_VERSION = document.body.dataset.version;
    async function pollSnapshotVersion() {
      const dot = document.getElementById("sync-dot");
      try {
        const response = await fetch("/api/snapshot-version", { cache: "no-store" });
        if (!response.ok) return;
        const payload = await response.json();
        if (payload.version && payload.version !== window.ENGRAM_VERSION) {
          window.location.reload();
          return;
        }
        const sync = document.getElementById("last-synced");
        if (sync && payload.checked_at) {
          sync.textContent = new Date(payload.checked_at).toLocaleTimeString();
        }
        dot.classList.remove("stale");
      } catch {
        dot.classList.add("stale");
      }
    }
    window.setInterval(pollSnapshotVersion, 2000);
  </script>
</body>
</html>
